<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">

<title>SPACE RANGER OLYMPICS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;}
body{font-family:'Orbitron','Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;}
#gameCanvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:20;padding:8px 10px;display:flex;justify-content:space-between;align-items:flex-start;}
#hudLeft{display:flex;flex-direction:column;gap:2px;margin-top:108px;}
#hudRight{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.hl{font-size:7px;letter-spacing:2px;color:rgba(0,212,255,0.5);}
.hv{font-size:clamp(12px,2.5vw,16px);font-weight:700;color:#00d4ff;text-shadow:0 0 10px rgba(0,212,255,0.6);}
.hv.gold{color:#ffdd44;text-shadow:0 0 10px rgba(255,220,68,0.6);}
#shBar{width:120px;height:8px;background:rgba(0,212,255,0.15);border-radius:4px;border:1px solid rgba(0,212,255,0.3);overflow:hidden;margin-top:3px;}
#shFill{height:100%;background:#00d4ff;border-radius:4px;transition:width 0.2s,background 0.3s;}
#shFill.low{background:#ff4444;}
#minimap{position:fixed;top:10px;left:10px;width:140px;height:105px;background:rgba(0,5,15,0.85);border:1px solid rgba(0,212,255,0.25);border-radius:6px;z-index:20;overflow:hidden;}
#mmCvs{width:140px;height:105px;}
#mmLbl{position:absolute;top:2px;left:4px;font-size:7px;letter-spacing:2px;color:rgba(0,212,255,0.4);pointer-events:none;}
#alertBar{position:fixed;top:70px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:25;opacity:0;transition:opacity 0.3s;white-space:nowrap;text-align:center;}
#alertBar.show{opacity:1;}
#alertTxt{font-size:clamp(10px,2.5vw,14px);font-weight:700;letter-spacing:3px;color:#ffe800;text-shadow:0 0 20px rgba(255,230,0,1);}
#roleBadge{position:fixed;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:21;font-size:8px;letter-spacing:3px;padding:4px 12px;border-radius:3px;border:1px solid rgba(0,212,255,0.3);}
#zoomBtns{position:fixed;pointer-events:all;z-index:20;display:flex;flex-direction:column;gap:5px;}
.zBtn{width:36px;height:36px;background:rgba(0,0,0,0.6);border:1px solid rgba(0,212,255,0.35);border-radius:7px;color:rgba(0,212,255,0.8);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
@media(orientation:portrait){#zoomBtns{bottom:160px;right:12px;}}
@media(orientation:landscape){#zoomBtns{right:12px;top:50%;transform:translateY(-50%);}}
/* Touch controls — exact spaceranger4 layout */
#touchCtrl{position:fixed;bottom:0;left:0;right:0;top:0;pointer-events:none;z-index:15;display:none;}
#jsWrap{position:absolute;pointer-events:all;width:120px;height:120px;}
#jsZoneL,#jsZoneR{position:absolute;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(0,212,255,0.22);pointer-events:none;}
#jsZoneL{left:6px;}#jsZoneR{right:6px;}
#joystickThumb{position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(0,200,255,0.9);border:2px solid #fff;top:20px;left:52px;box-shadow:0 0 10px rgba(0,212,255,0.8);pointer-events:none;transition:box-shadow 0.1s;}
#joystickThumb.active{box-shadow:0 0 16px rgba(0,255,220,1);}
#bThrust,#bFire,#bSpecial{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;-webkit-tap-highlight-color:transparent;touch-action:none;}
#bThrust{width:72px;height:72px;background:rgba(0,0,0,0.55);border:2px solid rgba(255,180,0,0.45);color:rgba(255,210,0,0.9);font-size:22px;}
#bFire{width:88px;height:88px;background:rgba(0,0,0,0.55);border:2px solid rgba(255,80,80,0.55);color:rgba(255,110,110,0.9);font-size:24px;}
#bSpecial{width:62px;height:62px;background:rgba(0,0,0,0.55);border:2px solid rgba(100,255,100,0.45);color:rgba(100,255,100,0.9);font-size:18px;}
#bThrust.pressed{background:rgba(255,180,0,0.18);border-color:rgba(255,210,0,0.9);}
#bFire.pressed{background:rgba(255,68,68,0.18);border-color:rgba(255,110,110,0.9);}
#bSpecial.pressed{background:rgba(100,255,100,0.18);border-color:rgba(100,255,100,0.9);}
#zoomBtns{position:absolute;pointer-events:all;display:flex;flex-direction:column;gap:6px;}
.zBtn{width:40px;height:40px;background:rgba(0,0,0,0.6);border:1px solid rgba(0,212,255,0.3);border-radius:8px;color:rgba(0,212,255,0.8);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
@media(orientation:portrait){
  #jsWrap{bottom:22px;left:14px;}
  #bThrust{bottom:48px;right:114px;}
  #bFire{bottom:28px;right:18px;}
  #bSpecial{bottom:130px;right:120px;}
  #zoomBtns{bottom:140px;right:18px;}
}
@media(orientation:landscape){
  #jsWrap{left:12px;top:50%;transform:translateY(-50%);}
  #bThrust{right:110px;top:50%;transform:translateY(-50%);}
  #bFire{right:14px;top:50%;transform:translateY(-20%);}
  #bSpecial{right:110px;top:25%;transform:translateY(-50%);}
  #zoomBtns{right:14px;top:10px;}
}
#shopOv{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:60;display:none;align-items:center;justify-content:center;padding:14px;}
#shopOv.show{display:flex;}
#shopCard{background:rgba(0,8,20,0.99);border-radius:14px;padding:18px 16px;max-width:320px;width:100%;max-height:90vh;overflow-y:auto;}

#shopCredLine{font-size:9px;text-align:center;margin-bottom:14px;letter-spacing:2px;color:#ffdd44;}
.sitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;margin-bottom:7px;}
.sico{font-size:20px;width:28px;text-align:center;}
.sinf{flex:1;}
.snm{font-size:8px;letter-spacing:2px;color:#fff;margin-bottom:2px;}
.sds{font-size:7px;color:rgba(200,220,240,0.5);letter-spacing:1px;}
.spr{font-size:11px;font-weight:700;}
.sbuy{border-radius:5px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:6px 10px;cursor:pointer;border:1px solid;}
#shopClose{width:100%;background:transparent;border-radius:5px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;padding:10px;cursor:pointer;margin-top:6px;color:rgba(0,212,255,0.5);border:1px solid rgba(0,212,255,0.2);}
#titleScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 50%,rgba(0,20,60,0.98) 0%,rgba(0,0,8,1) 80%);}
#titleCvs{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.ttl{position:relative;z-index:2;font-size:clamp(18px,5vw,38px);font-weight:900;letter-spacing:6px;text-align:center;color:#00d4ff;text-shadow:0 0 30px rgba(0,212,255,0.8);margin-bottom:6px;}
.tsub{position:relative;z-index:2;font-size:clamp(8px,2vw,11px);letter-spacing:5px;color:rgba(0,212,255,0.5);text-align:center;margin-bottom:16px;}
#pwBox{position:relative;z-index:2;margin-bottom:18px;text-align:center;}
#pwText{font-size:clamp(13px,3vw,20px);font-weight:900;letter-spacing:4px;color:#ffe800;text-shadow:0 0 20px rgba(255,230,0,0.8);padding:8px 20px;border:1px solid rgba(255,220,0,0.3);border-radius:6px;background:rgba(255,200,0,0.06);display:inline-block;}
.pw-lbl{font-size:7px;letter-spacing:3px;color:rgba(0,212,255,0.4);margin-bottom:6px;}
.pw-hint{font-size:7px;letter-spacing:2px;color:rgba(255,220,68,0.35);margin-top:5px;}
#roleSelect{position:relative;z-index:2;width:100%;max-width:340px;}
#roleSelect h3{font-size:9px;letter-spacing:3px;color:rgba(0,212,255,0.6);text-align:center;margin-bottom:10px;}
.teamRow{display:flex;gap:8px;margin-bottom:12px;justify-content:center;}
.teamBtn{flex:1;max-width:70px;padding:8px 4px;border-radius:5px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;cursor:pointer;border:2px solid;background:transparent;opacity:0.4;}
.teamBtn.sel{opacity:1;}
.roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.roleBtn{padding:8px 6px;border-radius:6px;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;cursor:pointer;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.05);color:rgba(0,212,255,0.8);text-align:center;}
.roleBtn.sel{background:rgba(0,212,255,0.2);border-color:rgba(0,212,255,0.8);color:#fff;}
#nameInput{width:100%;background:rgba(0,18,38,0.9);border:1px solid rgba(0,212,255,0.3);border-radius:5px;color:#00d4ff;font-size:16px;padding:8px 10px;font-family:inherit;outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px;}
#nameInput::placeholder{color:rgba(0,212,255,0.3);}
#startBtn{width:100%;background:rgba(0,212,255,0.1);border:2px solid rgba(0,212,255,0.7);border-radius:6px;color:#00d4ff;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;padding:13px;cursor:pointer;}
.mpBtn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.5);border-radius:6px;color:#00d4ff;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:10px 16px;cursor:pointer;transition:background 0.2s;}
.mpBtn:hover,.mpBtn.sel{background:rgba(0,212,255,0.22);border-color:rgba(0,212,255,0.9);}
#mpScreen{width:100%;max-width:340px;}
</style>
</head>

function initJoystick(){
var wrap=document.getElementById(‘jsWrap’);

var joyId=-1,ox=0,oy=0;
function getCenter(){var r=wrap.getBoundingClientRect();ox=r.left+r.width/2;oy=r.top+r.height/2;}
function applyTouch(t){
var dx=t.clientX-ox,dy=t.clientY-oy;
var d=Math.sqrt(dx*dx+dy*dy);
if(d>56){dx=dx/d*56;dy=dy/d*56;}
btn.left=(dx<-10);btn.right=(dx>10);
thumb.style.left=(52+dx-8)+‘px’;thumb.style.top=(20+dy-8)+‘px’;
}
function reset(){joyId=-1;btn.left=false;btn.right=false;thumb.classList.remove(‘active’);thumb.style.left=‘52px’;thumb.style.top=‘20px’;}
wrap.addEventListener(‘touchstart’,function(e){e.preventDefault();e.stopPropagation();if(joyId===-1){joyId=e.changedTouches[0].identifier;getCenter();thumb.classList.add(‘active’);applyTouch(e.changedTouches[0]);}},{passive:false});
wrap.addEventListener(‘touchmove’,function(e){e.preventDefault();e.stopPropagation();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyId){applyTouch(e.changedTouches[i]);return;}}},{passive:false});
wrap.addEventListener(‘touchend’,function(e){e.preventDefault();e.stopPropagation();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===joyId){reset();return;}}},{passive:false});
wrap.addEventListener(‘touchcancel’,function(e){e.preventDefault();reset();},{passive:false});
// Mouse fallback for desktop
var mouseDown=false;
wrap.addEventListener(‘mousedown’,function(e){mouseDown=true;getCenter();thumb.classList.add(‘active’);applyTouch(e);});
window.addEventListener(‘mousemove’,function(e){if(mouseDown)applyTouch(e);});
window.addEventListener(‘mouseup’,function(){if(mouseDown){mouseDown=false;reset();}});
}

function drawShip(x,y,angle,color,r,role,alive,stA,stR,isP,name,carrying,shPct){
if(!alive)return;
if(stA&&!stR&&!isP)return;
var s=ws(x,y),z=camera.zoom;
var alpha=stA?(isP?0.3:0.1):1;
// Role size multipliers
var sm=role===‘tow’?1.5:role===‘vanguard’?1.3:role===‘ranger’?1.2:role===‘stealth’?0.85:1.0;
var S=z*sm;

ctx.save();
ctx.globalAlpha=alpha;
ctx.translate(s.x,s.y);
// spaceranger4 convention: rotate by angle+PI/2 so nose points upward at angle=0
ctx.rotate(angle+Math.PI/2);

// Thrust flame behind hull (before drawing hull so hull renders on top)
var showFlame=(isP&&btn.thrust);
if(showFlame){
var fl=(14+Math.random()*10)*S;
ctx.beginPath();ctx.moveTo(-6*S,10*S);ctx.lineTo(0,(10+fl/S)*S);ctx.lineTo(6*S,10*S);
ctx.strokeStyle=‘rgba(255,’+(100+Math.floor(Math.random()*100))+’,0,0.85)’;ctx.lineWidth=3*S;ctx.stroke();
ctx.beginPath();ctx.moveTo(-3*S,10*S);ctx.lineTo(0,(10+fl/S*0.5)*S);ctx.lineTo(3*S,10*S);
ctx.strokeStyle=‘rgba(255,255,200,0.65)’;ctx.lineWidth=1.5*S;ctx.stroke();
}

// Main hull — exact spaceranger4 shape
ctx.beginPath();
ctx.moveTo(0,-16*S);
ctx.lineTo(-10*S,10*S);
ctx.lineTo(-4*S,6*S);
ctx.lineTo(0,9*S);
ctx.lineTo(4*S,6*S);
ctx.lineTo(10*S,10*S);
ctx.closePath();
ctx.fillStyle=‘rgba(0,22,42,0.92)’;
ctx.fill();
ctx.strokeStyle=carrying?‘rgba(0,255,170,0.95)’:color;
ctx.lineWidth=2*S;
ctx.stroke();

// Cockpit dot
ctx.beginPath();ctx.arc(0,-5*S,4*S,0,Math.PI*2);
ctx.fillStyle=carrying?‘rgba(0,255,170,0.7)’:(color+‘88’);
ctx.fill();

// Wing panels
ctx.beginPath();ctx.moveTo(-4*S,0);ctx.lineTo(-12*S,-8*S);ctx.lineTo(-10*S,4*S);
ctx.fillStyle=color+‘2a’;ctx.fill();
ctx.beginPath();ctx.moveTo(4*S,0);ctx.lineTo(12*S,-8*S);ctx.lineTo(10*S,4*S);
ctx.fillStyle=color+‘2a’;ctx.fill();

// Role-specific add-ons
if(role===‘tow’){
ctx.strokeStyle=color;ctx.lineWidth=2.5*S;
ctx.beginPath();ctx.moveTo(-10*S,-14*S);ctx.lineTo(-16*S,-14*S);ctx.lineTo(-16*S,-6*S);ctx.stroke();
ctx.beginPath();ctx.moveTo(10*S,-14*S);ctx.lineTo(16*S,-14*S);ctx.lineTo(16*S,-6*S);ctx.stroke();
} else if(role===‘vanguard’){
ctx.fillStyle=color+‘cc’;
ctx.fillRect(-15*S,-2*S,5*S,7*S);
ctx.fillRect(10*S,-2*S,5*S,7*S);
} else if(role===‘radar’){
ctx.strokeStyle=color;ctx.lineWidth=1.5*S;
ctx.beginPath();ctx.moveTo(0,-16*S);ctx.lineTo(0,-26*S);ctx.stroke();
ctx.beginPath();ctx.arc(0,-26*S,5*S,-Math.PI*0.8,Math.PI*1.8);ctx.stroke();
ctx.strokeStyle=color+‘55’;ctx.lineWidth=1*S;
ctx.beginPath();ctx.arc(0,-26*S,10*S,-Math.PI*0.7,Math.PI*1.7);ctx.stroke();
} else if(role===‘jockey1’||role===‘jockey2’){
ctx.strokeStyle=color;ctx.lineWidth=1.5*S;
ctx.beginPath();ctx.arc(0,-20*S,3.5*S,0,Math.PI*2);ctx.stroke();
ctx.fillStyle=‘rgba(0,220,255,0.7)’;
ctx.beginPath();ctx.arc(0,-20*S,1.8*S,0,Math.PI*2);ctx.fill();
} else if(role===‘stealth’&&!stA){
ctx.strokeStyle=color+‘55’;ctx.lineWidth=1*S;
ctx.beginPath();ctx.moveTo(0,-16*S);ctx.lineTo(0,9*S);ctx.stroke();
} else if(role===‘stealth’&&!stA){
ctx.strokeStyle=color+‘55’;ctx.lineWidth=1*S;
ctx.beginPath();ctx.moveTo(0,-16*S);ctx.lineTo(0,9*S);ctx.stroke();
}

// Warp core attached at tail of ship (positive Y = back in ship space)
if(carrying){
var coreCol=(carrying.color)?carrying.color:’#00ffaa’;
var corePulse=0.7+0.3*Math.sin(Date.now()*0.008);
var coreR=7*S*corePulse;
ctx.shadowColor=coreCol;ctx.shadowBlur=16*S*corePulse;
ctx.fillStyle=coreCol;
ctx.globalAlpha=0.9;
ctx.beginPath();ctx.arc(0,16*S,coreR,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=’#ffffff’;ctx.lineWidth=1.5*S;ctx.stroke();
// Rotating spokes
ctx.rotate(Date.now()*0.003);
for(var ci=0;ci<4;ci++){
var ca=ci/4*Math.PI*2;
ctx.beginPath();ctx.moveTo(Math.cos(ca)*(coreR+1),Math.sin(ca)*(coreR+1));ctx.lineTo(Math.cos(ca)*(coreR+5*S),Math.sin(ca)*(coreR+5*S));
ctx.strokeStyle=coreCol;ctx.lineWidth=1.5*S;ctx.stroke();
}
}

ctx.restore();

// Name label above ship
if(camera.zoom>0.45&&name){
ctx.save();ctx.globalAlpha=stA?0.25:1;
ctx.fillStyle=color;
ctx.font=‘bold ‘+Math.max(6,Math.round(7*z))+‘px Orbitron,monospace’;

}
}
